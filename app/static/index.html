<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 800px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-header h1 { font-size: 20px; }
        .chat-header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message { display: flex; flex-direction: column; max-width: 75%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.bot { align-self: flex-start; align-items: flex-start; }
        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .user .bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot .bubble {
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
        }
        .sources {
            font-size: 11px;
            color: #64748b;
            margin-top: 6px;
            padding: 6px 10px;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 3px solid #2563eb;
        }
        .confidence {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f1f5f9;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .chat-input {
            padding: 16px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }
        .chat-input input:focus { border-color: #2563eb; }
        .chat-input button {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
        }
        .chat-input button:hover { background: #1d4ed8; }
        .chat-input button:disabled { background: #94a3b8; cursor: not-allowed; }
        .clear-btn {
            padding: 6px 14px;
            background: none;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 12px;
            color: #64748b;
            cursor: pointer;
        }
        .clear-btn:hover { background: #f1f5f9; }
        .welcome {
            text-align: center;
            color: #94a3b8;
            margin: auto;
            padding: 40px;
        }
        .welcome h2 { font-size: 18px; margin-bottom: 8px; color: #64748b; }
        .welcome p { font-size: 14px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>RAG Assistant</h1>
        <p>Powered by Ollama phi3 + ChromaDB | Fully Local</p>
    </div>

    <div class="chat-messages" id="messages">
        <div class="welcome" id="welcome">
            <h2>Hello! Ask me anything</h2>
            <p>I will answer based on the uploaded documents</p>
        </div>
    </div>

    <div class="chat-input">
        <button class="clear-btn" id="clear-btn">Clear</button>
        <input type="text" id="input" placeholder="Ask a question about the documents..." />
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    let sessionId = null;

    // Attach event listeners properly
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('clear-btn').addEventListener('click', clearChat);
    document.getElementById('input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    function clearChat() {
        if (sessionId) {
            fetch('/chat/' + sessionId, { method: 'DELETE' });
        }
        sessionId = null;
        document.getElementById('messages').innerHTML = `
            <div class="welcome" id="welcome">
                <h2>Hello! Ask me anything</h2>
                <p>I will answer based on the uploaded documents</p>
            </div>`;
    }

    function addMessage(role, text, sources, confidence) {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const messages = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'message ' + role;

        let html = '<div class="bubble">' + text + '</div>';

        if (sources && sources.length > 0) {
            const unique = [...new Set(sources)];
            html += '<div class="sources">Sources: ' + unique.join(', ') + '</div>';
        }
        if (confidence) {
            html += '<div class="confidence">Confidence: ' + (confidence * 100).toFixed(0) + '%</div>';
        }

        div.innerHTML = html;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
        const messages = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'message bot';
        div.id = 'typing';
        div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    async function sendMessage() {
        const input = document.getElementById('input');
        const btn = document.getElementById('send-btn');
        const question = input.value.trim();
        if (!question) return;

        addMessage('user', question);
        input.value = '';
        btn.disabled = true;
        showTyping();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: question,
                    session_id: sessionId,
                    top_k: 5,
                    min_score: 0.2
                })
            });

            const data = await res.json();
            sessionId = data.session_id;
            removeTyping();
            addMessage('bot', data.answer, data.sources, data.confidence);

        } catch(err) {
            removeTyping();
            addMessage('bot', 'Error connecting to server. Is Ollama running?');
        }

        btn.disabled = false;
        input.focus();
    }
</script>
</body>
</html>
